<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client - 파일 업로드</title>
    <link rel="stylesheet" href="/common.css" />
    <link rel="stylesheet" href="/client/client.css" />
</head>
<body>
<div class="container">
    <h1>파일 업로드</h1>

    <section class="section">
        <div class="upload-row">
            <input id="upload-file-input" type="file" />
            <button id="upload-btn" type="button">업로드</button>
        </div>
        <p id="upload-result" class="upload-result"></p>
    </section>

    <section class="section">
        <h2>업로드 파일 목록</h2>
        <table class="file-table">
            <thead>
            <tr>
                <th>파일명</th>
                <th>확장자</th>
                <th>크기(bytes)</th>
                <th>업로드시각</th>
                <th>다운로드</th>
            </tr>
            </thead>
            <tbody id="file-list"></tbody>
        </table>
    </section>

    <p id="error-message" class="error"></p>
</div>
<script src="/client/client.js"></script>
</body>
</html>
