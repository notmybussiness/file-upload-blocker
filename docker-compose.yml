version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: extension-blocker-app:latest
    container_name: extension-blocker-app
    ports:
      - "80:8080" # 외부 HTTP 포트를 컨테이너 서버 포트로 매핑 (VM IP로 바로 접속 가능하도록)
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/secrets/gcp-credentials.json
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/extension_blocker
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-admin}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - GCP_BUCKET_NAME=${GCP_BUCKET_NAME:-extension-blocker-storage}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:?GCP_PROJECT_ID is required}
    volumes:
      # 로컬에 다운받은 GCP Key 파일을 컨테이너 내부에 주입하여 인증시킬 경로
      - ./gcp-credentials.json:/etc/secrets/gcp-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15-alpine
    container_name: extension-blocker-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=extension_blocker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d extension_blocker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
