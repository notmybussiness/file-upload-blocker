name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Build & Unit / Slice Tests
  # ──────────────────────────────────────────────
  build-and-unit-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate application-local.properties for CI
        run: |
          cat > src/main/resources/application-local.properties << 'EOF'
          spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.h2.console.enabled=false
          app.storage.type=local
          app.storage.local.root-path=./build/uploads
          EOF

      - name: Build
        run: ./gradlew build -x test --no-daemon

      - name: Run Unit & Slice Tests
        run: |
          ./gradlew test --no-daemon \
            --tests '*ControllerTest' \
            --tests '*ServiceTest' \
            --tests '*ApplicationTests'

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: build/reports/tests/test/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Stage 2: Integration Tests (Testcontainers)
  # ──────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build-and-unit-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate application-local.properties for CI
        run: |
          cat > src/main/resources/application-local.properties << 'EOF'
          spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.h2.console.enabled=false
          app.storage.type=local
          app.storage.local.root-path=./build/uploads
          EOF

      - name: Run Integration Tests
        run: ./gradlew test --no-daemon --tests '*IntegrationTest'

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: build/reports/tests/test/
          retention-days: 7
